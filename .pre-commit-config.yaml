repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--config-file=pyproject.toml]
        files: ^src/
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args: ["--min-confidence=80", "src/guard", "tests", "vulture_whitelist.py"]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
  - repo: local
    hooks:
      - id: pytest-on-push
        name: pytest (full suite)
        entry: uv run pytest -x
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: bandit-on-push
        name: bandit (security lint)
        entry: uv run --with bandit bandit -c pyproject.toml -r src/
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: zizmor-on-push
        name: zizmor (workflow audit)
        entry: uv run --with zizmor zizmor .
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^\.github/workflows/.*\.ya?ml$
