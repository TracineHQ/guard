version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "13:37"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "13:42"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
