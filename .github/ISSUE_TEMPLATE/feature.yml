name: Feature request
description: Propose a new feature or enhancement for guard.
title: "feature: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the change clearly. The motivation section is the
        single most useful field for the maintainers — lead with the user
        problem, not the solution.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it worth doing?
    validations:
      required: true
  - type: textarea
    id: proposed-behaviour
    attributes:
      label: Proposed behaviour
      description: How should guard behave once this lands?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they were rejected.
    validations:
      required: true
