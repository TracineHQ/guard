name: Bug report
description: Report a bug in guard
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: input
    id: hook-id
    attributes:
      label: Hook ID
      description: Which hook is misbehaving (e.g. `pre-tool-use`, `post-tool-use`).
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs actual behaviour
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
