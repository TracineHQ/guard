name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Mypy strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --extra dev
      - run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Pin Python version
        run: uv python pin ${{ matrix.python }}
      - run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing
      - name: E2E plugin install smoke test
        run: uv run pytest tests/integration/test_plugin_e2e.py -v

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Build wheel and sdist
        run: uv build
      - name: List artifacts
        run: ls -la dist/
      - name: Verify hook modules are bundled in the wheel
        shell: bash
        run: |
          set -eu
          for module in bash_command_validator git_c_validator credential_check \
                        commit_message_validator agent_output_guard \
                        protected_files subagent_scope; do
            unzip -l dist/*.whl | grep -F "guard/hooks/${module}.py" \
              || { echo "ERROR: ${module}.py missing from built wheel"; exit 1; }
          done

  detect-secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --extra dev
      - name: Run detect-secrets via pre-commit
        run: uv run pre-commit run detect-secrets --all-files
