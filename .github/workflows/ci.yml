name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Mypy strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --extra dev
      - run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Pin Python version
        run: uv python pin ${{ matrix.python }}
      - run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing
      - name: E2E plugin install smoke test
        run: uv run pytest tests/integration/test_plugin_e2e.py -v

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Build wheel and sdist
        run: uv build
      - name: List artifacts
        run: ls -la dist/
      - name: Verify hook modules are bundled in the wheel
        shell: bash
        run: |
          set -eu
          for module in bash_command_validator git_c_validator credential_check \
                        commit_message_validator agent_output_guard \
                        protected_files subagent_scope; do
            unzip -l dist/*.whl | grep -F "guard/hooks/${module}.py" \
              || { echo "ERROR: ${module}.py missing from built wheel"; exit 1; }
          done
      - name: Upload built distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  install-smoke:
    name: Install-from-wheel smoke test (${{ matrix.python }} on ${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install built wheel into a clean venv
        shell: bash
        run: |
          set -eux
          python -m venv /tmp/guard-smoke
          # Install the local artifact directly by path — no remote resolution,
          # no PyPI index, just the bytes we built one job ago. This is the
          # most-pinned form of install and clears scorecard's
          # PinnedDependenciesID rule (which targets remote pip installs).
          wheel=$(ls dist/tracine_guard-*.whl)
          test -f "$wheel" || { echo "no wheel found in dist/"; exit 1; }
          /tmp/guard-smoke/bin/python -m pip install --no-index "$wheel"
      - name: Verify CLI binary on PATH and reports the right version
        shell: bash
        run: |
          set -eux
          source /tmp/guard-smoke/bin/activate
          which guard
          guard --version
          guard --help | grep -q "guard read-side CLI"
          guard --json status | python -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'version' in d, d
          assert 'log_exists' in d, d
          assert d.get('schema_version') == 1, d
          print('status OK', d['version'])
          "
          # `guard test` invokes hook decide() in-process. Confirms argparse
          # wiring + each hook's import path survives wheel installation.
          guard --json test "rm -rf /" | python -c "
          import json, sys
          d = json.load(sys.stdin)
          decisions = {r['hook_id']: r['decision'] for r in d['commands'][0]['results']}
          assert decisions.get('guard.bash_command_validator') == 'deny', d
          print('guard test deny OK:', decisions)
          "
      - name: Verify import surface
        shell: bash
        run: |
          set -eux
          /tmp/guard-smoke/bin/python -c "
          import guard, importlib.metadata as m
          dist_version = m.version('tracine-guard')
          assert guard.__version__ == dist_version, (guard.__version__, dist_version)
          # Hooks are importable as scripts via -m
          import guard.hooks.bash_command_validator
          import guard.hooks.git_c_validator
          import guard.hooks.credential_check
          import guard.hooks.commit_message_validator
          import guard.hooks.agent_output_guard
          import guard.hooks.protected_files
          import guard.hooks.subagent_scope
          print('OK', guard.__version__)
          "
      - name: Verify a hook responds to a synthetic PreToolUse payload
        shell: bash
        run: |
          set -eux
          # Feed a clearly-dangerous payload; confirm the wheel-installed hook
          # script returns deny on stdin/stdout. End-to-end validates that
          # entry points + argparse + JSON contract all survive packaging.
          # Hooks exit 2 on deny (Claude Code's "block" signal) — that's not
          # a smoke-test failure, that IS the success condition. Capture the
          # exit code separately so set -e doesn't propagate it.
          payload='{"tool_name":"Bash","tool_input":{"command":"rm -rf /"}}'
          set +e
          out=$(echo "$payload" | /tmp/guard-smoke/bin/python -m guard.hooks.bash_command_validator)
          rc=$?
          set -e
          test "$rc" = "2" || { echo "expected deny exit=2, got $rc"; exit 1; }
          echo "$out" | python -c "
          import json, sys
          d = json.loads(sys.stdin.read())
          assert d['hookSpecificOutput']['permissionDecision'] == 'deny', d
          print('hook deny OK')
          "
      - name: Verify AWS catalog allow/deny/override end-to-end
        shell: bash
        run: |
          set -eux
          # Read the corpus and assert every command's disposition matches its
          # block marker. Uses the wheel-installed guard binary so the full
          # packaging + entry-point path is exercised.
          #
          # Block markers:
          #   #allow           — no hook must return deny
          #   #deny            — at least one hook must return deny
          #   #override <env>  — set GUARD_ADMIN_ALLOW_VERBS=<env>, assert allow
          #
          # permission_mode=default: override blocks must be tested in interactive
          # mode so GUARD_ADMIN_ALLOW_VERBS takes effect before strict-deny.
          CORPUS="tests/integration/aws_catalog_smoke_corpus.txt"
          GUARD_BIN="/tmp/guard-smoke/bin/guard"
          /tmp/guard-smoke/bin/python - "$CORPUS" "$GUARD_BIN" <<'PYEOF'
          import json
          import os
          import subprocess
          import sys

          corpus_path, guard_bin = sys.argv[1], sys.argv[2]

          with open(corpus_path) as fh:
              lines = fh.readlines()

          current_marker = None
          current_override_env = None
          failures = []

          for raw in lines:
              line = raw.strip()
              if not line:
                  continue
              if line.startswith("#allow"):
                  current_marker = "allow"
                  current_override_env = None
                  continue
              if line.startswith("#deny"):
                  current_marker = "deny"
                  current_override_env = None
                  continue
              if line.startswith("#override "):
                  current_marker = "override"
                  current_override_env = line[len("#override "):].strip()
                  continue
              if line.startswith("#"):
                  continue

              cmd = line
              env = os.environ.copy()
              if current_marker == "override" and current_override_env:
                  env["GUARD_ADMIN_ALLOW_VERBS"] = current_override_env

              proc = subprocess.run(
                  [guard_bin, "--json", "test", cmd],
                  capture_output=True,
                  text=True,
                  env=env,
              )
              try:
                  data = json.loads(proc.stdout)
              except json.JSONDecodeError:
                  failures.append(f"PARSE ERROR for {cmd!r}: stdout={proc.stdout!r}")
                  continue

              results = data.get("commands", [{}])[0].get("results", [])
              decisions = [r.get("decision") for r in results]
              has_deny = any(d == "deny" for d in decisions)

              if current_marker == "allow":
                  if has_deny:
                      failures.append(
                          f"[allow] UNEXPECTED DENY for {cmd!r}: {decisions}"
                      )
              elif current_marker == "deny":
                  if not has_deny:
                      failures.append(
                          f"[deny] EXPECTED DENY for {cmd!r}: {decisions}"
                      )
              elif current_marker == "override":
                  if has_deny:
                      failures.append(
                          f"[override {current_override_env}] UNEXPECTED DENY for {cmd!r}: {decisions}"
                      )

          if failures:
              print("FAILURES:")
              for f in failures:
                  print(" ", f)
              sys.exit(1)

          print("AWS catalog smoke: all commands matched expected disposition.")
          PYEOF

      - name: Run full pytest suite against the wheel-installed package
        shell: bash
        run: |
          set -eux
          # Install test deps into the same venv. Only what tests import —
          # ruff/mypy/vulture have their own jobs and aren't needed here.
          # hypothesis + pytest-timeout are imported by the DoS-bound tests
          # in tests/integration/test_synth_matchers_coverage.py.
          /tmp/guard-smoke/bin/pip install pytest pytest-cov pytest-xdist pytest-timeout hypothesis

          # Confirm `import guard` resolves to the wheel-installed package,
          # not the in-tree src/. pytest's rootdir gets prepended to sys.path
          # but src/ does not, so the import falls through to site-packages.
          /tmp/guard-smoke/bin/python -c "
          import guard
          assert '/site-packages/' in guard.__file__, \
              f'guard imported from source tree, not wheel: {guard.__file__}'
          print('guard imported from:', guard.__file__)
          "

          # Run the full suite against the installed bytes. Integration tests
          # that subprocess into src/ via PYTHONPATH still pass — those are
          # meta-tests on the source layout, not import-resolution checks.
          /tmp/guard-smoke/bin/python -m pytest -q --no-header

  detect-secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --extra dev
      - name: Run detect-secrets via pre-commit
        run: uv run pre-commit run detect-secrets --all-files

  bandit:
    name: Bandit security lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Run bandit
        run: uv run --with bandit bandit -c pyproject.toml -r src/

  semgrep:
    name: Semgrep static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Run semgrep (hook rules, block on error)
        run: |
          uv run --with semgrep semgrep scan --error \
            --config .semgrep/rules/no-prefix-predicate-in-readonly.yml \
            --config .semgrep/rules/no-startswith-in-predicate-field.yml \
            src/guard/hooks/
      - name: Run semgrep (test-hygiene rules, block on ERROR-severity only)
        run: uv run --with semgrep semgrep scan --error --severity ERROR --config .semgrep/rules/test-hygiene.yml tests/

  vulture:
    name: Dead-code sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Run vulture
        run: uv run --with vulture vulture src/guard tests vulture_whitelist.py --min-confidence 80

  pip-audit:
    name: Audit dependencies for CVEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Export requirements
        run: uv export --format requirements-txt --no-hashes --no-emit-project --extra dev > requirements-audit.txt
      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit -r requirements-audit.txt --strict

  zizmor:
    name: Workflow security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e  # v0.5.3

  pinact:
    name: Action SHA pin enforcement
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6  # v2.0.0
        with:
          verify_only: true
