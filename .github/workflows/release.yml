name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        # Release builds publish artifacts; running off a cache could let a
        # poisoned cache entry land in the wheel. Pay the cold-install cost.
        with:
          enable-cache: false
      - name: Verify tag matches pyproject.toml version
        shell: bash
        run: |
          set -eu
          tag="${GITHUB_REF_NAME#v}"
          file_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$file_version" ]; then
            echo "ERROR: tag $GITHUB_REF_NAME ($tag) does not match pyproject.toml version $file_version"
            exit 1
          fi
          echo "Tag and pyproject.toml agree on version $tag"
      - name: Build wheel and sdist
        run: uv build
      - name: List artifacts
        run: ls -la dist/
      - name: Generate sha256 manifest of built artifacts
        # Captured here so the smoke job can pin its TestPyPI install with
        # --require-hashes — verifying the bytes that landed on TestPyPI
        # match exactly what `uv build` produced one job ago.
        shell: bash
        run: |
          set -eu
          cd dist
          shasum -a 256 ./*.whl ./*.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Upload built distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 30
          if-no-files-found: error

  testpypi-publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tracine-guard
    permissions:
      id-token: write  # OIDC token for Trusted Publisher
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  testpypi-smoke:
    name: Smoke-test TestPyPI install (${{ matrix.python }} on ${{ matrix.os }})
    needs: testpypi-publish
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.13']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Download built distribution (for SHA256SUMS manifest)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Install tracine-guard from TestPyPI with --require-hashes
        shell: bash
        run: |
          set -eux
          tag="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/guard-smoke

          # Build a hash-pinned requirements file from the SHA256SUMS the
          # build job generated. --require-hashes makes pip refuse anything
          # whose downloaded bytes don't match. This catches:
          #   - TestPyPI returning different bytes than we uploaded
          #   - MITM on the install path
          #   - cache poisoning on the runner
          # plus clears scorecard's PinnedDependenciesID rule.
          wheel_hash=$(awk '/\.whl$/ { print $1 }' dist/SHA256SUMS)
          sdist_hash=$(awk '/\.tar\.gz$/ { print $1 }' dist/SHA256SUMS)
          test -n "$wheel_hash" -a -n "$sdist_hash" \
            || { echo "missing hash in dist/SHA256SUMS"; cat dist/SHA256SUMS; exit 1; }

          cat > /tmp/req.txt <<EOF
          tracine-guard==${tag} \\
              --hash=sha256:${wheel_hash} \\
              --hash=sha256:${sdist_hash}
          EOF
          cat /tmp/req.txt

          # TestPyPI indexes a release lazily; retry up to ~2 minutes.
          for attempt in 1 2 3 4 5 6 7 8; do
            if /tmp/guard-smoke/bin/pip install \
                --require-hashes \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                -r /tmp/req.txt; then
              break
            fi
            echo "Install attempt $attempt failed, sleeping 15s..."
            sleep 15
          done
      - name: Verify CLI binary, version, and import
        shell: bash
        run: |
          set -eux
          tag="${GITHUB_REF_NAME#v}"
          source /tmp/guard-smoke/bin/activate
          which guard
          guard_version=$(guard --version | head -n 1 | awk '{print $NF}')
          test "$guard_version" = "$tag" \
            || { echo "guard --version reported $guard_version, expected $tag"; exit 1; }
          guard --help | grep -q "guard read-side CLI"
          /tmp/guard-smoke/bin/python -c "
          import guard, importlib.metadata as m
          assert guard.__version__ == m.version('tracine-guard')
          import guard.hooks.bash_command_validator
          import guard.hooks.git_c_validator
          print('OK', guard.__version__)
          "
      - name: Verify a hook denies a dangerous payload end-to-end
        shell: bash
        run: |
          set -eux
          # Hooks exit 2 on deny (Claude Code's block signal); capture
          # the exit code rather than letting set -e propagate it.
          payload='{"tool_name":"Bash","tool_input":{"command":"rm -rf /"}}'
          set +e
          out=$(echo "$payload" | /tmp/guard-smoke/bin/python -m guard.hooks.bash_command_validator)
          rc=$?
          set -e
          test "$rc" = "2" || { echo "expected deny exit=2, got $rc"; exit 1; }
          echo "$out" | python -c "
          import json, sys
          d = json.loads(sys.stdin.read())
          assert d['hookSpecificOutput']['permissionDecision'] == 'deny', d
          print('hook deny OK')
          "

  pypi-publish:
    name: Publish to PyPI (production)
    needs: testpypi-smoke
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tracine-guard
    permissions:
      id-token: write  # OIDC token for Trusted Publisher
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  gh-release:
    name: Create GitHub release
    needs: pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create release with built artifacts attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz
